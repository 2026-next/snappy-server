name: Auto PR to dev

on:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH_NAME: ${{ github.ref_name }}
      BASE_BRANCH: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open pull request
        run: |
          existing_pr=$(gh pr list \
            --base "$BASE_BRANCH" \
            --head "${{ github.repository_owner }}:$BRANCH_NAME" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$existing_pr" ]; then
            echo "Pull request #$existing_pr already exists for $BRANCH_NAME -> $BASE_BRANCH."
            exit 0
          fi

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "Auto PR: $BRANCH_NAME" \
            --body "Automatically opened from $BRANCH_NAME into $BASE_BRANCH."
